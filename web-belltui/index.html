<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔔 벨튀 대작전 — 네온시티 2087</title>
<meta name="description" content="사이버펑크 도시의 빌런 벨튀 시뮬레이터. 다양한 빌런 캐릭터로 플레이하세요!">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="loading">
    <h1>🔨 벨튀 대작전</h1>
    <div class="load-wrap"><div id="loadbar" class="load-fill"></div></div>
    <p id="loadtxt" class="sub">로딩 중... 0%</p>
  </div>
  <div id="hud" class="hid">
    <div class="s"><img src="assets/2d/ui_bell.png" class="hud-icon"> <span id="hs">0</span></div>
    <div class="s">🔥 <span id="hc">0</span></div>
    <div class="s"><img src="assets/2d/ui_heart.png" class="hud-icon"> <span id="hl">3</span></div>
    <div class="s">🏢 <span id="hf">1F</span></div>
    <div class="s notoriety"><img src="assets/2d/ui_wanted_star.png" class="hud-icon"> 악명 <span id="hn">0</span></div>
    <div class="s good"><img src="assets/2d/ui_good_halo.png" class="hud-icon"> 선행 <span id="hg">0</span></div>
    <div class="s ability-hud" id="hud-ability" style="display:none">
      <span id="ha-key">Q</span> <span id="ha-name"></span>
      <div class="ability-cd-bar"><div id="ha-cd" class="ability-cd-fill"></div></div>
    </div>
  </div>
  <div id="title" class="hid">
    <h1>🔨 벨튀 대작전</h1>
    <h2>— 네온시티 2087 —</h2>
    <p class="sub">사이버펑크 도시의 빌런 벨튀 시뮬레이터</p>
    <button id="btn-start" class="btn" onclick="showCharSelect()">▶ 빌런 선택</button>
    <div class="info">
      <kbd>←→</kbd> 이동 <kbd>↑↓</kbd> 층이동 <kbd>Space</kbd> 벨튀<br>
      <kbd>Shift</kbd> 대시 <kbd>F</kbd> 선행 <kbd>Q</kbd> 능력 발동
    </div>
  </div>

  <!-- Character Select Screen -->
  <div id="charselect" class="hid" style="display:none">
    <h1>🎭 빌런 에이전트 선택</h1>
    <p class="sub">당신의 빌런을 선택하세요</p>
    <div id="char-cards" class="char-cards-grid"></div>
    <div class="charselect-actions">
      <button class="btn" onclick="startWithChar()">⚡ 출격!</button>
      <button class="btn purple" onclick="document.getElementById('charselect').classList.add('hid');document.getElementById('title').classList.remove('hid')">← 뒤로</button>
    </div>
  </div>

  <div id="over">
    <h1>GAME OVER</h1>
    <div id="fscore">0</div>
    <div id="fdetail"></div>
    <div id="fending"></div>
    <button class="btn" onclick="showCharSelect()">🎭 캐릭터 선택</button>
    <button class="btn purple" onclick="restartSameChar()">🔄 같은 캐릭터로 재도전</button>
  </div>
  <div id="alerts"></div>
</div>
<script src="sprites.js"></script>
<script src="character-select.js"></script>
<script src="game.js"></script>
</body>
</html>
