<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>🔔 벨튀 대작전 — 네온시티 2087</title>
<meta name="description" content="사이버펑크 도시의 빌런 벨튀 시뮬레이터. 다양한 빌런 캐릭터로 플레이하세요!">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="loading">
    <h1>🔨 벨튀 대작전</h1>
    <div class="load-wrap"><div id="loadbar" class="load-fill"></div></div>
    <p id="loadtxt" class="sub">로딩 중... 0%</p>
  </div>
  <div id="hud" class="hid">
    <div class="s timer-hud">⏱ <span id="ht">90</span></div>
    <div class="s"><img src="assets/2d/ui_bell.png" class="hud-icon"> <span id="hs">0</span></div>
    <div class="s">🔥 <span id="hc">0</span></div>
    <div class="s"><img src="assets/2d/ui_heart.png" class="hud-icon"> <span id="hl">3</span></div>
    <div class="s">🏢 <span id="hf">1F</span></div>
    <div class="s notoriety"><img src="assets/2d/ui_wanted_star.png" class="hud-icon"> 악명 <span id="hn">0</span></div>
    <div class="s good"><img src="assets/2d/ui_good_halo.png" class="hud-icon"> 선행 <span id="hg">0</span></div>
    <div class="s ability-hud" id="hud-ability" style="display:none">
      <span id="ha-key">Q</span> <span id="ha-name"></span>
      <div class="ability-cd-bar"><div id="ha-cd" class="ability-cd-fill"></div></div>
    </div>
  </div>
  <div id="title" class="hid">
    <h1>🔨 벨튀 대작전</h1>
    <h2>— 네온시티 2087 —</h2>
    <p class="sub">사이버펑크 도시의 빌런 벨튀 시뮬레이터</p>
    <button id="btn-start" class="btn" onclick="showCharSelect()">▶ 솔로 플레이</button>
    <button id="btn-multi" class="btn purple" onclick="showMultiLobby()">🌐 멀티플레이 (팬 참여)</button>
    <div class="info">
      <kbd>←→</kbd> 이동 <kbd>↑↓</kbd> 층이동 <kbd>Space</kbd> 벨튀<br>
      <kbd>Shift</kbd> 대시 <kbd>F</kbd> 선행 <kbd>Q</kbd> 능력 발동
    </div>
  </div>

  <!-- Multiplayer Lobby -->
  <div id="multi-lobby" class="hid" style="display:none">
    <h1>🌐 멀티플레이 로비</h1>
    <p class="sub">팬들이 아래 코드로 접속합니다</p>
    <div id="room-code-display" style="font-size:48px;font-weight:800;color:#E94560;letter-spacing:12px;margin:16px 0;text-shadow:0 0 20px rgba(233,69,96,.4)">----</div>
    <div id="fan-url" class="sub" style="font-size:12px;color:#889">팬 접속 URL: <span id="fan-link">-</span></div>
    <div id="fan-list" style="margin:16px 0;padding:12px;background:rgba(255,255,255,.04);border-radius:12px;min-height:60px">
      <p class="sub">대기 중인 팬: <strong id="fan-counter">0</strong>명</p>
      <div id="fan-names" style="font-size:13px;color:#aab"></div>
    </div>
    <div style="margin:12px 0;padding:12px;background:rgba(255,209,102,.04);border:1px solid rgba(255,209,102,.15);border-radius:12px;width:100%">
      <p style="font-size:13px;color:#ffd166;margin-bottom:8px;font-weight:600">🎁 MVP 보상 (숲)</p>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn reward-opt" onclick="setReward('구독권')" id="rw-sub" style="flex:1;padding:8px;border:2px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.04);color:#ddd;font-family:Outfit;cursor:pointer;font-size:13px">📋 구독권</button>
        <button class="btn reward-opt" onclick="setReward('퀵뷰')" id="rw-qv" style="flex:1;padding:8px;border:2px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.04);color:#ddd;font-family:Outfit;cursor:pointer;font-size:13px">⚡ 퀵뷰</button>
        <button class="btn reward-opt" onclick="setReward('')" id="rw-none" style="flex:1;padding:8px;border:2px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.04);color:#ddd;font-family:Outfit;cursor:pointer;font-size:13px">없음</button>
      </div>
      <input type="text" id="reward-custom" placeholder="직접 입력 (예: 별풍선 1000개)" maxlength="30" style="width:100%;padding:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-family:Outfit;font-size:13px;outline:none" oninput="setReward(this.value)">
    </div>
    <button id="btn-host-start" class="btn" onclick="hostStartGame()" disabled>⚡ 게임 시작</button>
    <button class="btn purple" onclick="leaveMulti()">← 뒤로</button>
  </div>

  <!-- Character Select Screen -->
  <div id="charselect" class="hid" style="display:none">
    <h1>🎭 빌런 에이전트 선택</h1>
    <p class="sub">당신의 빌런을 선택하세요</p>
    <div id="char-cards" class="char-cards-grid"></div>
    <div class="charselect-actions">
      <button class="btn" onclick="startWithChar()">⚡ 출격!</button>
      <button class="btn purple" onclick="document.getElementById('charselect').classList.add('hid');document.getElementById('title').classList.remove('hid')">← 뒤로</button>
    </div>
  </div>

  <div id="over">
    <h1>GAME OVER</h1>
    <div id="fscore">0</div>
    <div id="fdetail"></div>
    <div id="fending"></div>
    <button class="btn" onclick="showCharSelect()">🎭 캐릭터 선택</button>
    <button class="btn purple" onclick="restartSameChar()">🔄 같은 캐릭터로 재도전</button>
  </div>
  <div id="alerts"></div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="sprites.js"></script>
<script src="net.js"></script>
<script src="character-select.js"></script>
<script src="game.js"></script>
</body>
</html>
